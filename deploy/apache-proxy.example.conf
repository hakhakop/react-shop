# Add this inside the SSL VirtualHost for the React virtual server.
# Adjust the domain and port to match your Virtualmin setup.

ProxyPreserveHost On
ProxyRequests Off

ProxyPass / http://127.0.0.1:3001/
ProxyPassReverse / http://127.0.0.1:3001/

RequestHeader set X-Forwarded-Proto "https"
RequestHeader set X-Forwarded-Port "443"

# Next.js uses WebSocket/SSE-style upgrades in some development/runtime paths.
RewriteEngine On
RewriteCond %{HTTP:Upgrade} =websocket [NC]
RewriteRule /(.*) ws://127.0.0.1:3001/$1 [P,L]
